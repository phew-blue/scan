name: Dev

on:
  push:
    branches: [dev]

concurrency:
  group: dev-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: latest
          run_install: false
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm test
        working-directory: frontend

  build:
    name: Build & push dev
    needs: [test]
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/phew-blue/scan
          tags: |
            type=raw,value=dev

      - name: Get short SHA
        id: vars
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        id: build
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=dev
            NEXT_PUBLIC_APP_VERSION=dev:${{ steps.vars.outputs.sha }}
          provenance: false
          cache-from: type=registry,ref=${{ env.REGISTRY }}/phew-blue/scan:dev
          cache-to: type=inline

  reconcile-dev:
    name: Reconcile dev deployment
    needs: [build]
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Trigger deployment
        env:
          DIGEST: ${{ needs.build.outputs.digest }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          DISPATCH_URL: ${{ secrets.HOME_OPS_DISPATCH_URL }}
        run: |
          printf '{"event_type":"scan-dev-deployed","client_payload":{"digest":"%s"}}' "${DIGEST}" \
            | gh api "$DISPATCH_URL" --method POST --input -
