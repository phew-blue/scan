name: Dev

on:
  push:
    branches: [dev]

concurrency:
  group: dev-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test
    runs-on: home-ops
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: latest
          run_install: false
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm test
        working-directory: frontend

  build:
    name: Build & push dev
    needs: [test]
    runs-on: home-ops
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/phew-blue/scan
          tags: |
            type=raw,value=dev

      - name: Get short SHA
        id: vars
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        id: build
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=dev
            NEXT_PUBLIC_APP_VERSION=dev:${{ steps.vars.outputs.sha }}
          provenance: false
          cache-from: type=registry,ref=${{ env.REGISTRY }}/phew-blue/scan:dev
          cache-to: type=inline

  reconcile-dev:
    name: Reconcile dev deployment
    needs: [build]
    runs-on: home-ops
    steps:
      - name: Commit digest to home-ops and trigger Flux reconcile
        env:
          DIGEST: ${{ needs.build.outputs.digest }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Update digest in home-ops so Flux deploys the exact image
          git clone https://x-access-token:${GH_TOKEN}@github.com/phew-blue/home-ops.git /tmp/home-ops
          cd /tmp/home-ops
          sed -i "s|digest: \".*\"|digest: \"${DIGEST}\"|" kubernetes/apps/dev/scan/app/helmrelease.yaml
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add kubernetes/apps/dev/scan/app/helmrelease.yaml
            git commit -m "chore(dev/scan): pin image digest"
            git push
          fi

          # Trigger immediate Flux reconcile rather than waiting for polling interval
          curl -sSLo /tmp/kubectl "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
          chmod +x /tmp/kubectl
          /tmp/kubectl annotate helmrelease scan -n dev \
            reconcile.fluxcd.io/requestedAt="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --overwrite
