<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>

  <!-- Left bracket [ -->
  <rect x="2"   y="5"    width="2"   height="22"  fill="#60a5fa"/>
  <rect x="2"   y="5"    width="5"   height="1.5" fill="#60a5fa"/>
  <rect x="2"   y="25.5" width="5"   height="1.5" fill="#60a5fa"/>

  <!-- Right bracket ] -->
  <rect x="28"  y="5"    width="2"   height="22"  fill="#60a5fa"/>
  <rect x="25"  y="5"    width="5"   height="1.5" fill="#60a5fa"/>
  <rect x="25"  y="25.5" width="5"   height="1.5" fill="#60a5fa"/>

  <!-- Barcode bars — centered in x=7–25 (inner bracket space), y=7–25 -->
  <rect x="7.75"  y="7" width="1"   height="18" fill="#ffffff"/>
  <rect x="9.75"  y="7" width="1.5" height="18" fill="#ffffff"/>
  <rect x="12.25" y="7" width="1"   height="18" fill="#ffffff"/>
  <rect x="14.25" y="7" width="1.5" height="18" fill="#ffffff"/>
  <rect x="16.75" y="7" width="1"   height="18" fill="#ffffff"/>
  <rect x="18.75" y="7" width="1.5" height="18" fill="#ffffff"/>
  <rect x="21.25" y="7" width="1"   height="18" fill="#ffffff"/>
  <rect x="23.25" y="7" width="1"   height="18" fill="#ffffff"/>
</svg>
