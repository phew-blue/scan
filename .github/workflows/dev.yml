name: Dev

on:
  push:
    branches: [dev]

concurrency:
  group: dev-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & push dev
    runs-on: home-ops
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/phew-blue/scan
          tags: |
            type=raw,value=dev

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        id: build
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BUILD_VERSION=dev
          provenance: false
          cache-from: type=registry,ref=${{ env.REGISTRY }}/phew-blue/scan:dev
          cache-to: type=inline

  reconcile-dev:
    name: Reconcile dev deployment
    needs: [build]
    runs-on: home-ops
    steps:
      - name: Patch HelmRelease and trigger Flux reconcile
        env:
          DIGEST: ${{ needs.build.outputs.digest }}
        run: |
          curl -sSLo /tmp/kubectl "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
          chmod +x /tmp/kubectl
          if [ -n "$DIGEST" ]; then
            /tmp/kubectl patch helmrelease scan -n dev --type=merge \
              -p "{\"spec\":{\"values\":{\"controllers\":{\"main\":{\"containers\":{\"app\":{\"image\":{\"digest\":\"$DIGEST\"}}}}}}}}"
          fi
          /tmp/kubectl annotate helmrelease scan -n dev \
            reconcile.fluxcd.io/requestedAt="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --overwrite
